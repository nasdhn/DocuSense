<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuSense</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            padding: 24px 32px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .upload-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #chat {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Personnalisation de la barre de défilement */
        #chat::-webkit-scrollbar {
            width: 6px;
        }
        #chat::-webkit-scrollbar-track {
            background: transparent;
        }
        #chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        #chat::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }

        .input-area {
            padding: 24px;
            display: flex;
            gap: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        #question {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            padding: 18px 24px;
            border-radius: 999px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #question:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        #question::placeholder {
            color: var(--text-muted);
        }

        #send {
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        #send:hover {
            transform: translateY(-2px) scale(1.05);
            background: var(--primary-hover);
        }

        #send svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-left: -2px;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
            .container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📚 DocuSense</h1>
            <p>Intelligence documentaire propulsée par l'IA</p>
            
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            <button id="uploadBtn" class="upload-btn">📄 Ajouter un document</button>
        </div>

        <div id="chat">
            <div class="message assistant">
                Bonjour ! Posez-moi n'importe quelle question sur vos documents.
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input
                    id="question"
                    type="text"
                    placeholder="Posez votre question ici..."
                    autocomplete="off"
                >
            </div>
            <button id="send" aria-label="Envoyer">
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // --- 1. SÉLECTION DES ÉLÉMENTS DOM ---
        const chatContainer = document.getElementById('chat');
        const questionInput = document.getElementById('question');
        const sendButton = document.getElementById('send');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');

        // --- 2. FONCTION POUR AJOUTER UN MESSAGE AU CHAT ---
        function addMessage(text, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            if (role === 'assistant') {
                messageDiv.innerHTML = text
            } else {
                messageDiv.textContent = text
            } // Sécurisé contre les failles XSS
            
            chatContainer.appendChild(messageDiv);
            
            // Défilement automatique vers le bas à chaque nouveau message
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // --- 3. LOGIQUE D'ENVOI DE QUESTIONS (/ask) ---
        sendButton.addEventListener('click', async () => {
            const text = questionInput.value.trim();

            // Bloquer l'envoi si le champ est vide
            if (text === '') return;

            // Affichage de la question de l'utilisateur et nettoyage de l'input
            addMessage(text, 'user');
            questionInput.value = '';

            try {
                // Envoi de la requête au serveur au format JSON
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: text })
                });

                const data = await response.json();

                // Affichage de la réponse du serveur (ajuste 'data.answer' selon ton backend)
                addMessage(data.answer || "Réponse reçue du serveur.", 'assistant');

            } catch (error) {
                addMessage("❌ Oups, impossible de joindre le serveur pour répondre à ta question.", 'assistant');
            }
        });

        // Envoi avec la touche Entrée
        questionInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                sendButton.click();
            }
        });

        // --- 4. LOGIQUE D'IMPORTATION DE DOCUMENTS (/ingest) ---
        // Déclenchement de la boîte de dialogue de sélection au clic sur le bouton visible
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // Détection de la sélection du fichier
        fileInput.addEventListener('change', async () => {
            const file = fileInput.files[0];
            
            if (!file) return;

            // Notification visuelle immédiate dans le chat
            addMessage(`⏳ Envoi et analyse de "${file.name}" en cours...`, 'assistant');

            // Construction du FormData
            const formData = new FormData();
            formData.append("file", file);

            try {
                // Envoi de la requête au serveur (le navigateur gère seul le Content-Type multi-part)
                const response = await fetch('/ingest', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    addMessage("✅ Document ajouté et analysé avec succès ! Tu peux maintenant me poser tes questions.", 'assistant');
                } else {
                    addMessage("❌ Une erreur est survenue sur le serveur lors de l'analyse du document.", 'assistant');
                }
            } catch (error) {
                addMessage("❌ Impossible de joindre le serveur. Vérifie ta connexion.", 'assistant');
            }
            
            // Remise à zéro de l'input pour pouvoir ré-importer le même fichier si besoin
            fileInput.value = '';
        });
    </script>
</body>
</html>
