<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuSense</title>
    
    <!-- Importation de la police Inter -->
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap)" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #1e293b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            padding: 24px 32px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            margin-top: 6px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
        }

        #chat {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Personnalisation de la barre de défilement */
        #chat::-webkit-scrollbar {
            width: 6px;
        }
        #chat::-webkit-scrollbar-track {
            background: transparent;
        }
        #chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        #chat::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
            color: #e2e8f0;
        }

        .input-area {
            padding: 24px;
            display: flex;
            gap: 16px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        #question {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            background: rgba(255, 255, 255, 0.03);
            color: white;
            padding: 18px 24px;
            border-radius: 999px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        #question:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        #question::placeholder {
            color: var(--text-muted);
        }

        #send {
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        #send:hover {
            transform: translateY(-2px) scale(1.05);
            background: var(--primary-hover);
        }

        #send svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-left: -2px; /* Centrage visuel de l'avion */
        }

        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
            .container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📚 DocuSense</h1>
            <p>Intelligence documentaire propulsée par l'IA</p>
        </div>

        <div id="chat">
            <div class="message assistant">
                Bonjour ! Posez-moi n'importe quelle question sur vos documents.
            </div>
            
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input
                    id="question"
                    type="text"
                    placeholder="Posez votre question ici..."
                    autocomplete="off"
                >
            </div>
            <button id="send" aria-label="Envoyer">
                <!-- Icône SVG d'avion en papier pour un look plus moderne -->
                <svg viewBox="0 0 24 24">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
    // 1. On récupère les éléments importants de la page
    const chatContainer = document.getElementById('chat');
    const questionInput = document.getElementById('question');
    const sendButton = document.getElementById('send');

    // Fonction pratique pour créer et afficher un message à l'écran
    function addMessage(text, role) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`; // 'role' sera 'user' ou 'assistant'

        if (role === 'assistant') {
             messageDiv.innerHTML = text; 
        }
        else {
            messageDiv.textContent = text;     
        }       // On insère le texte en toute sécurité
        
        chatContainer.appendChild(messageDiv);    // On l'ajoute dans le chat
        chatContainer.scrollTop = chatContainer.scrollHeight; // On fait défiler tout en bas
    }

    // 2. Que se passe-t-il quand on clique sur "Envoyer" ?
    sendButton.addEventListener('click', async () => {
        const text = questionInput.value.trim();

        // Si le champ est vide, on arrête tout
        if (text === '') return;

        // 3. On affiche le message de l'utilisateur
        addMessage(text, 'user');

        // 4. On vide le champ de texte
        questionInput.value = '';

        try {
            // 5. On envoie la requête (fetch) au serveur sur la route /ask
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ question: text })
            });

            // On attend la réponse du serveur et on la lit
            const data = await response.json();

            // 6. On affiche la réponse de l'assistant
            // (Assure-toi que ton serveur renvoie bien un objet avec une clé 'answer' ou adapte ce mot)
            addMessage(data.answer, 'assistant');

        } catch (error) {
            // En cas de problème de connexion avec le serveur
            addMessage("Oups, impossible de joindre le serveur.", 'assistant');
        }
    });

    // Bonus : Permettre d'envoyer en appuyant sur la touche "Entrée" du clavier
    questionInput.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            sendButton.click();
        }
    });
</script>

</body>
</html>
